<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector Chess</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Vector Chess</h1>
  <p>Move with vectors. Multiply with scalars. Destroy the grid.</p>
</header>

<div class="game-layout">
  <div class="player-side" id="side-white"></div>

  <div class="center-col" id="center-col">
    <div class="panel deck-info" id="deck-info"></div>
    <div class="panel" id="move-panel"></div>
    <div class="panel">
      <h3>Game Log</h3>
      <div class="game-log" id="game-log"></div>
    </div>
  </div>

  <div class="player-side" id="side-black"></div>
</div>

<div class="game-over-overlay hidden" id="game-over">
  <div class="game-over-box">
    <h2 id="game-over-title">Game Over</h2>
    <p id="game-over-msg"></p>
    <button onclick="initGame()">Play Again</button>
  </div>
</div>

<script src="game.js"></script>
<script src="render.js"></script>
<script>initGame();</script>
</body>
</html>
